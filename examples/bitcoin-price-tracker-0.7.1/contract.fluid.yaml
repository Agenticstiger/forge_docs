fluidVersion: "0.7.1"
kind: DataProduct
id: crypto.bitcoin_prices_gcp_governed
name: Bitcoin Price Index (FLUID 0.7.1 + Governance)
description: Real-time Bitcoin price data with comprehensive governance policies, sovereignty controls, and AI usage restrictions
domain: finance

# Standard metadata
metadata:
  layer: Gold
  owner:
    team: data-engineering
    email: data-engineering@company.com

# Optional tags (supported by schema)
tags:
  - cryptocurrency
  - real-time
  - governed
  - gdpr-compliant

# Optional labels (supported by schema)
labels:
  cost_center: "CC-1234"
  business_criticality: "high"
  compliance_gdpr: "true"
  compliance_soc2: "true"

# ═══════════════════════════════════════════════════════════════
# 0.7.1 NEW FEATURES: Sovereignty & AI Governance
# ═══════════════════════════════════════════════════════════════

# Data Sovereignty (NEW in 0.7.1)
sovereignty:
  jurisdiction: "EU"
  dataResidency: true
  allowedRegions:
    - EU                # GCP EU multi-region (required for Data Catalog)
    - europe-west3      # GCP Frankfurt (GDPR compliant)
    - europe-west1      # GCP Belgium
    - eu-central-1      # AWS Frankfurt
  deniedRegions:
    - us-east-1         # Explicitly block US regions
    - us-west-2
  crossBorderTransfer: false
  transferMechanisms:
    - SCCs              # Standard Contractual Clauses
  regulatoryFramework:
    - GDPR
  enforcementMode: advisory  # strict|advisory|audit (strict blocks deployment)
  validationRequired: true
  
  tags:
    - gdpr-compliant
    - eu-residency
    - data-sovereignty
  
  labels:
    compliance_region: "EU"
    data_classification: "regulated"
    transfer_restriction: "strict"

# Note: agentPolicy is planned for future FLUID versions
# For now, AI governance is handled through policy.tags and labels

# ═══════════════════════════════════════════════════════════════
# Access Policy: IAM Bindings (WHO can access data)
# ═══════════════════════════════════════════════════════════════
# NOTE: This is a root-level accessPolicy for convenience with policy-compile.
# The 0.7.1 schema may expect this under each expose's policy section,
# but policy-compile currently reads from root level.

accessPolicy:
  grants:
    # Data Analytics Team - Read Access
    - principal: "group:data-analytics@company.com"
      permissions:
        - read
        - select
        - query
      
    # Finance Team - Read Access
    - principal: "group:finance-team@company.com"
      permissions:
        - read
        - select
      
    # Trading Desk - Read Access
    - principal: "group:trading-desk@company.com"
      permissions:
        - read
        - select
        - query
      
    # Looker Service Account - Read Access
    - principal: "serviceAccount:looker@<<YOUR_PROJECT_HERE>>.iam.gserviceaccount.com"
      permissions:
        - read
        - select
      
    # Data Pipeline Service Account - Write Access
    - principal: "serviceAccount:data-pipeline@<<YOUR_PROJECT_HERE>>.iam.gserviceaccount.com"
      permissions:
        - write
        - insert
        - update
        - delete
      
    # Data Engineering Team - Write Access
    - principal: "group:data-engineering@company.com"
      permissions:
        - write
        - insert
        - update

# ═══════════════════════════════════════════════════════════════
# Build: API Ingestion with Execution Configuration
# ═══════════════════════════════════════════════════════════════

builds:
  - id: bitcoin_price_ingestion
    description: Fetch Bitcoin prices from CoinGecko API with data quality validation
    pattern: hybrid-reference
    engine: python
    repository: ./runtime
    properties:
      model: ingest
    
    tags:
      - api-ingestion
      - real-time
      - coingecko
    
    labels:
      source_api: "coingecko"
      ingestion_pattern: "pull"
      data_format: "json"
    
    # Execution trigger configuration
    execution:
      trigger:
        type: manual
        iterations: 1   # Run 2 times in CI/CD pipeline
        delaySeconds: 5 # 3 second delay between runs
      
      runtime:
        platform: gcp
        resources:
          cpu: "1"
          memory: "2Gi"
      
      retries:
        count: 3
        backoff: exponential
    
    outputs:
      - bitcoin_prices_table

# ═══════════════════════════════════════════════════════════════
# Expose: BigQuery Table with Full Governance
# ═══════════════════════════════════════════════════════════════

exposes:
  - exposeId: bitcoin_prices_table
    title: "Bitcoin Real-time Price Feed"
    version: "1.0.0"
    kind: table
    
    # Tags for discoverability and governance
    tags:
      - financial-data
      - real-time
      - api-sourced
      - internal-use
    
    # Labels for automation and filtering
    labels:
      sensitivity: "internal"
      data_domain: "finance"
      update_frequency: "realtime"
      retention_years: "7"
      region: "eu"
    
    # Platform binding
    binding:
      platform: gcp
      format: bigquery_table
      location:
        project: dust-labs-485011
        dataset: crypto_data_labeled_1
        table: bitcoin_prices
        region: EU  # Multi-region required for Data Catalog policy tags
    
    # ═══════════════════════════════════════════════════════════
    # GOVERNANCE POLICIES (v0.5.7 compatible, enhanced in 0.7.1)
    # ═══════════════════════════════════════════════════════════
    
    policy:
      # Data classification
      classification: Internal  # Options: Public, Internal, Confidential, Restricted
      
      # Authentication method
      authn: iam  # Options: oidc, oauth2, api_key, none, custom, iam, jwt
      
      # Authorization policies
      authz:
        readers:
          - group:data-analytics@company.com
          - group:finance-team@company.com
          - group:trading-desk@company.com
          - serviceAccount:looker@<<YOUR_PROJECT_HERE>>.iam.gserviceaccount.com
        
        writers:
          - serviceAccount:data-pipeline@<<YOUR_PROJECT_HERE>>.iam.gserviceaccount.com
          - group:data-engineering@company.com
        
        # Column-level access control (example - not enforced in free tier)
        columnRestrictions:
          - principal: "group:interns@company.com"
            columns:
              - market_cap_usd
              - volume_24h_usd
            access: deny
            tags:
              - sensitive-financial-data
      
      # Privacy controls
      privacy:
        # Data masking rules
        masking:
          - column: "ingestion_timestamp"
            strategy: "hash"
            params:
              algorithm: "SHA256"
            labels:
              pii_type: "operational_data"
              reason: "audit_trail_protection"
        
        # Row-level security (example - not enforced in free tier)
        rowLevelPolicy:
          expression: "ingestion_timestamp >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 DAY)"
          tags:
            - data-retention
            - gdpr-compliance
      
      # Policy tags for governance
      tags:
        - gdpr-compliant
        - soc2-compliant
        - financial-data
      
      # Policy labels for automation
      labels:
        compliance_framework: "GDPR,SOC2,ISO27001,MiFID_II"
        audit_required: "true"
        data_lineage_tracked: "true"
    
    # ═══════════════════════════════════════════════════════════
    # Schema Contract with Field-Level Metadata
    # ═══════════════════════════════════════════════════════════
    
    contract:
      schema:
        - name: price_timestamp
          type: timestamp
          required: true
          description: "Timestamp when the price was recorded (UTC)"
          sensitivity: cleartext
          semanticType: "timestamp"
          labels:
            timezone: "UTC"
            partition_field: "true"
          tags:
            - temporal
            - utc-timezone
            - partition-key
          
        - name: price_usd
          type: numeric
          required: true
          description: "Bitcoin price in US Dollars"
          sensitivity: cleartext
          semanticType: "currency"
          labels:
            policyTag: "financial_metrics"
            taxonomy: "financial_data"
            datacatalog_project: "dust-labs-485011"
            datacatalog_location: "eu"
            currency: "USD"
            precision: "2"
          tags:
            - price-data
            - usd-denominated
            - business-critical
          
        - name: price_eur
          type: numeric
          required: true
          description: "Bitcoin price in Euros"
          sensitivity: cleartext
          semanticType: "currency"
          labels:
            policyTag: "financial_metrics"
            taxonomy: "financial_data"
            datacatalog_project: "dust-labs-485011"
            datacatalog_location: "eu"
            currency: "EUR"
            precision: "2"
          tags:
            - price-data
            - eur-denominated
            - business-critical
          
        - name: price_gbp
          type: numeric
          required: true
          description: "Bitcoin price in British Pounds"
          sensitivity: cleartext
          semanticType: "currency"
          labels:
            policyTag: "financial_metrics"
            taxonomy: "financial_data"
            datacatalog_project: "dust-labs-485011"
            datacatalog_location: "eu"
            currency: "GBP"
            precision: "2"
          tags:
            - price-data
            - gbp-denominated
            - business-critical
          
        - name: market_cap_usd
          type: numeric
          required: false
          description: "Total Bitcoin market capitalization in USD"
          sensitivity: internal
          semanticType: "metric"
          labels:
            policyTag: "market_metrics"
            taxonomy: "financial_data"
            datacatalog_project: "dust-labs-485011"
            datacatalog_location: "eu"
            metric_type: "market_cap"
            currency: "USD"
          tags:
            - market-data
            - aggregated
            - financial-metric
          
        - name: volume_24h_usd
          type: numeric
          required: false
          description: "24-hour trading volume in USD"
          sensitivity: internal
          semanticType: "metric"
          labels:
            policyTag: "market_metrics"
            taxonomy: "financial_data"
            datacatalog_project: "dust-labs-485011"
            datacatalog_location: "eu"
            metric_type: "volume"
            currency: "USD"
          tags:
            - market-data
            - aggregated
            - trading-volume
          
        - name: price_change_24h
          type: numeric
          required: false
          description: "Price change in last 24 hours (percentage)"
          sensitivity: cleartext
          semanticType: "percentage"
          labels:
            metric_type: "derived"
            calculation: "percentage_change"
            volatility_indicator: "true"
          tags:
            - derived-metric
            - volatility-indicator
            - percentage
          
        - name: last_updated
          type: timestamp
          required: true
          description: "Timestamp from CoinGecko API (source system time)"
          sensitivity: cleartext
          semanticType: "timestamp"
          labels:
            source: "coingecko_api"
            timezone: "UTC"
            field_type: "source_timestamp"
          tags:
            - source-metadata
            - utc-timezone
            - api-timestamp
          
        - name: ingestion_timestamp
          type: timestamp
          required: true
          description: "When this record was ingested into our system"
          sensitivity: cleartext
          semanticType: "timestamp"
          labels:
            system_generated: "true"
            audit_field: "true"
            timezone: "UTC"
            default: "CURRENT_TIMESTAMP()"
          tags:
            - audit-trail
            - pipeline-metadata
            - utc-timezone
            - system-field
