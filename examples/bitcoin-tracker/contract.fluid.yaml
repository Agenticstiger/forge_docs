fluidVersion: "0.7.1"
kind: DataProduct
id: crypto.bitcoin_prices_gcp
name: bitcoin-prices-gcp

# Product-level tags for discovery and categorization
tags:
  - crypto
  - bitcoin
  - real-time
  - api-integration
  - time-series
  - public-data

# Product-level labels for FinOps and governance
labels:
  cost-center: "engineering"
  business-unit: "data-platform"
  data-classification: "public"
  retention-policy: "90-days"
  compliance-framework: "none"
  billing-tag: "crypto-analytics"

metadata:
  layer: Gold
  owner:
    team: data-engineering
    email: data-eng@example.com
  businessContext:
    domain: Financial Markets
    subdomain: Cryptocurrency Analytics

# Declarative data transformations with external references
builds:
  - id: ingest_bitcoin_prices
    description: Fetch Bitcoin prices from CoinGecko API and load to BigQuery
    pattern: hybrid-reference
    engine: python
    repository: ./runtime
    properties:
      model: ingest_bitcoin_prices
    
    execution:
      trigger:
        type: manual  # Run manually or via scheduler
      runtime:
        resources:
          memory: "512Mi"
        timeout: "PT5M"
      retries:
        maxAttempts: 3
        backoffStrategy: exponential
    
    outputs:
      - bitcoin_prices_table

  - id: calculate_daily_summary
    description: Calculate daily Bitcoin price statistics using dbt
    pattern: hybrid-reference
    engine: dbt
    repository: ./dbt
    properties:
      model: daily_price_summary
    
    outputs:
      - daily_price_summary

  - id: calculate_price_trends
    description: Calculate moving averages and price trends using dbt
    pattern: hybrid-reference
    engine: dbt
    repository: ./dbt
    properties:
      model: price_trends
    
    outputs:
      - price_trends

exposes:
  - exposeId: bitcoin_prices_table
    kind: table
    title: Bitcoin Prices Table
    version: 1.0.0
    
    # Expose-level tags for dataset categorization
    tags:
      - raw-data
      - time-series
      - high-frequency
      - non-pii
    
    # Expose-level labels for BigQuery resource tracking
    labels:
      environment: production
      data-source: coingecko-api
      update-frequency: hourly
      cost-allocation: crypto-team
      sla-tier: gold
      data-owner: data-engineering
    
    # Data governance policies
    policy:
      classification: Public  # No PII, publicly available data
      
      authz:
        readers:
          - group:data-analysts@company.com
          - group:data-scientists@company.com
          - serviceAccount:airflow@company.iam.gserviceaccount.com
        writers:
          - serviceAccount:ingestion@company.iam.gserviceaccount.com
    
    contract:
      # Contract-level tags for data quality
      tags:
        - validated
        - production-ready
      
      schema:
        - name: price_timestamp
          type: TIMESTAMP
          required: true
          description: "When the price was recorded"
          sensitivity: none  # Public data
          semanticType: timestamp
          businessName: "Price Timestamp"
          tags:
            - partition-key
            - time-series
        
        - name: price_usd
          type: FLOAT64
          required: true
          description: "Bitcoin price in USD"
          sensitivity: none
          semanticType: currency
          businessName: "Bitcoin Price (USD)"
          tags:
            - metric
            - price-data
          labels:
            unit: "usd"
            precision: "2-decimals"
        
        - name: price_eur
          type: FLOAT64
          required: true
          description: "Bitcoin price in EUR"
          sensitivity: none
          semanticType: currency
          businessName: "Bitcoin Price (EUR)"
          tags:
            - metric
            - price-data
          labels:
            unit: "eur"
        
        - name: price_gbp
          type: FLOAT64
          required: true
          description: "Bitcoin price in GBP"
          sensitivity: none
          semanticType: currency
          businessName: "Bitcoin Price (GBP)"
          tags:
            - metric
            - price-data
          labels:
            unit: "gbp"
        
        - name: market_cap_usd
          type: FLOAT64
          required: true
          description: "Total market capitalization in USD"
          sensitivity: none
          semanticType: currency
          businessName: "Market Capitalization"
          tags:
            - metric
            - market-data
          labels:
            aggregation: "sum"
        
        - name: volume_24h_usd
          type: FLOAT64
          required: true
          description: "24-hour trading volume in USD"
          sensitivity: none
          semanticType: currency
          businessName: "24h Trading Volume"
          tags:
            - metric
            - volume-data
          labels:
            window: "24h"
        
        - name: price_change_24h_percent
          type: FLOAT64
          required: false
          description: "24-hour price change percentage"
          sensitivity: none
          semanticType: percentage
          businessName: "24h Price Change"
          tags:
            - metric
            - derived
          labels:
            calculation: "percentage-change"
        
        - name: ingestion_timestamp
          type: TIMESTAMP
          required: true
          description: "When data was ingested into BigQuery"
          sensitivity: internal  # Operational metadata
          semanticType: timestamp
          businessName: "Ingestion Timestamp"
          tags:
            - metadata
            - audit-trail
    
    binding:
      platform: gcp
      format: bigquery_table
      location:
        project: dust-labs-485011
        dataset: crypto_data
        table: bitcoin_prices
        region: us-central1

  - exposeId: daily_price_summary
    kind: view
    title: Daily Price Summary
    version: 1.0.0
    
    tags:
      - analytics
      - daily-aggregation
      - aggregated
    
    labels:
      materialized: "view"
      update-frequency: real-time
      aggregation-level: daily
      cost-allocation: crypto-team
    
    policy:
      classification: Public
    
    contract:
      tags:
        - production-ready
        - analytics
      
      schema:
        - name: date
          type: DATE
          required: true
          description: "Calendar date for aggregation"
          semanticType: date
          businessName: "Date"
          tags:
            - dimension
            - time
        
        - name: min_price_usd
          type: FLOAT64
          required: true
          description: "Minimum Bitcoin price for the day (USD)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Low"
          tags:
            - metric
            - aggregated
          labels:
            aggregation: "minimum"
        
        - name: max_price_usd
          type: FLOAT64
          required: true
          description: "Maximum Bitcoin price for the day (USD)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily High"
          tags:
            - metric
            - aggregated
          labels:
            aggregation: "maximum"
        
        - name: avg_price_usd
          type: FLOAT64
          required: true
          description: "Average Bitcoin price for the day (USD)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Average Price"
          tags:
            - metric
            - aggregated
          labels:
            aggregation: "average"
        
        - name: open_price_usd
          type: FLOAT64
          required: false
          description: "First price recorded for the day (OHLC Open)"
          sensitivity: none
          semanticType: currency
          businessName: "Opening Price"
          tags:
            - metric
            - ohlc
          labels:
            calculation: "first-value"
        
        - name: close_price_usd
          type: FLOAT64
          required: false
          description: "Last price recorded for the day (OHLC Close)"
          sensitivity: none
          semanticType: currency
          businessName: "Closing Price"
          tags:
            - metric
            - ohlc
          labels:
            calculation: "last-value"
        
        - name: daily_volatility
          type: FLOAT64
          required: false
          description: "Standard deviation of prices (volatility indicator)"
          sensitivity: none
          semanticType: number
          businessName: "Daily Volatility"
          tags:
            - metric
            - statistical
          labels:
            calculation: "stddev"
        
        - name: price_range
          type: FLOAT64
          required: false
          description: "Difference between max and min price (daily range)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Price Range"
          tags:
            - metric
            - derived
          labels:
            calculation: "max-minus-min"
        
        - name: avg_market_cap_usd
          type: FLOAT64
          required: false
          description: "Average market capitalization for the day"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Avg Market Cap"
          tags:
            - metric
            - aggregated
          labels:
            aggregation: "average"
        
        - name: avg_volume_24h_usd
          type: FLOAT64
          required: false
          description: "Average 24h trading volume to avoid double counting"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Avg Volume"
          tags:
            - metric
            - aggregated
          labels:
            aggregation: "average"
        
        - name: avg_price_eur
          type: FLOAT64
          required: false
          description: "Average Bitcoin price for the day (EUR)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Avg Price (EUR)"
          tags:
            - metric
            - aggregated
            - currency-conversion
          labels:
            aggregation: "average"
            currency: "EUR"
        
        - name: avg_price_gbp
          type: FLOAT64
          required: false
          description: "Average Bitcoin price for the day (GBP)"
          sensitivity: none
          semanticType: currency
          businessName: "Daily Avg Price (GBP)"
          tags:
            - metric
            - aggregated
            - currency-conversion
          labels:
            aggregation: "average"
            currency: "GBP"
        
        - name: data_points
          type: INT64
          required: true
          description: "Number of price records aggregated for this day"
          sensitivity: internal
          semanticType: count
          businessName: "Data Point Count"
          tags:
            - metadata
            - quality
          labels:
            aggregation: "count"
        
        - name: first_update
          type: TIMESTAMP
          required: true
          description: "Timestamp of first price update for the day"
          sensitivity: internal
          semanticType: timestamp
          businessName: "First Update Time"
          tags:
            - metadata
            - audit-trail
        
        - name: last_update
          type: TIMESTAMP
          required: true
          description: "Timestamp of last price update for the day"
          sensitivity: internal
          semanticType: timestamp
          businessName: "Last Update Time"
          tags:
            - metadata
            - audit-trail
    
    binding:
      platform: gcp
      format: bigquery_table
      location:
        project: dust-labs-485011
        dataset: crypto_data
        table: daily_price_summary
        region: us-central1

  - exposeId: price_trends
    kind: view
    title: Price Trends with Moving Averages
    version: 1.0.0
    
    tags:
      - analytics
      - trends
      - moving-averages
      - technical-analysis
    
    labels:
      materialized: "view"
      analysis-type: technical
      update-frequency: real-time
      cost-allocation: crypto-team
    
    policy:
      classification: Public
    
    contract:
      tags:
        - production-ready
        - technical-indicators
      
      schema:
        - name: price_timestamp
          type: TIMESTAMP
          required: true
          description: "Timestamp of the price observation"
          semanticType: timestamp
          businessName: "Timestamp"
          tags:
            - dimension
            - time-series
        
        - name: price_usd
          type: FLOAT64
          required: true
          description: "Bitcoin price in USD"
          sensitivity: none
          semanticType: currency
          businessName: "Spot Price"
          tags:
            - metric
            - price-data
        
        - name: ma_7day
          type: FLOAT64
          required: false
          description: "7-day moving average (168 hours)"
          sensitivity: none
          semanticType: currency
          businessName: "7-Day Moving Average"
          tags:
            - metric
            - moving-average
            - derived
          labels:
            window: "7-days"
            calculation: "rolling-average"
        
        - name: ma_30day
          type: FLOAT64
          required: false
          description: "30-day moving average (720 hours)"
          sensitivity: none
          semanticType: currency
          businessName: "30-Day Moving Average"
          tags:
            - metric
            - moving-average
            - derived
          labels:
            window: "30-days"
            calculation: "rolling-average"
        
        - name: deviation_from_7day_ma
          type: FLOAT64
          required: false
          description: "Price deviation from 7-day moving average"
          sensitivity: none
          semanticType: currency
          businessName: "Deviation from 7-Day MA"
          tags:
            - metric
            - derived
            - variance
          labels:
            calculation: "difference"
            reference: "7day-ma"
    
    binding:
      platform: gcp
      format: bigquery_table
      location:
        project: dust-labs-485011
        dataset: crypto_data
        table: price_trends
        region: us-central1
