version: 2

sources:
  - name: crypto_data
    description: "Bitcoin price data from CoinGecko API"
    database: dust-labs-485011
    schema: crypto_data
    tables:
      - name: bitcoin_prices
        description: "Raw Bitcoin price data with hourly snapshots"
        columns:
          - name: price_timestamp
            description: "When the price was recorded"
            tests:
              - not_null
          - name: price_usd
            description: "Bitcoin price in USD"
            tests:
              - not_null
          - name: ingestion_timestamp
            description: "When data was ingested into BigQuery"
            tests:
              - not_null

models:
  - name: daily_price_summary
    description: "Daily Bitcoin price statistics and OHLC data"
    columns:
      - name: date
        description: "Date of the price summary"
        tests:
          - not_null
          - unique
      - name: avg_price_usd
        description: "Average Bitcoin price in USD for the day"
        tests:
          - not_null
      - name: daily_volatility
        description: "Standard deviation of prices for the day"

  - name: price_trends
    description: "Bitcoin price trends with moving averages"
    columns:
      - name: price_timestamp
        description: "Timestamp of the price"
        tests:
          - not_null
      - name: ma_7day_usd
        description: "7-day moving average in USD"
      - name: ma_30day_usd
        description: "30-day moving average in USD"
